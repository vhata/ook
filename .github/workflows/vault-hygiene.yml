name: vault-hygiene

# Webhook-driven (and manually triggerable) vault hygiene. The webhook
# handler at `src/app/api/webhooks/books/reindex/route.ts` fires a
# `repository_dispatch` event of type `vault-hygiene` after every push
# to `vhata/books` (subject to a short-circuit on its own auto-hygiene
# commits). This workflow checks out both repos, runs `make vault-lint`
# (fail-loud), runs the offline-fast backfills with `--apply` against
# the books checkout, and pushes a single `Auto-hygiene:` commit if
# anything changed.
#
# Loop avoidance: the next webhook fire after this workflow's push runs
# the backfills again, finds no diff, no commit. The webhook handler
# additionally short-circuits when the head commit message starts with
# `Auto-hygiene:`, so the cheapest path is to never re-enter at all.
#
# Required secrets:
#   - `GH_BOOKS_PAT` — fine-grained PAT with `contents: read+write` on
#     `vhata/books`. The existing `GITHUB_BOOKS_PAT` used by the
#     `/admin` write surface has the same permissions; the operator
#     can either provision a separate secret of the same shape or
#     reuse the existing PAT under a new repo-secret name.
#   - `HARDCOVER_TOKEN` (optional) — Hardcover GraphQL JWT, same value
#     the operator uses locally in `.env.local`. When set, the sync
#     step pushes vault status/rating/dates up to Hardcover after the
#     other backfills land. Unset = the sync step is skipped silently
#     (the rest of the workflow still runs).
#
# Skipped intentionally: `scripts/backfill-tags.mjs` (Open Library) is
# rate-limited and minutes-slow; it stays operator-initiated via
# `make vault-backfill-apply`. The Hardcover *fetch* scripts
# (`backfill-series-rosters`, `backfill-hardcover-books`) also stay
# operator-initiated — they're cache-warming, not status-syncing, and
# we don't want every push burning Hardcover's 60/min budget.

on:
  repository_dispatch:
    types: [vault-hygiene]
  workflow_dispatch:

# Coalesce rapid pushes — only the latest dispatch actually runs.
concurrency:
  group: vault-hygiene
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env so the step-level `if:` can read HARDCOVER_TOKEN.
    # `if: secrets.X != ''` is rejected by Actions; the conventional
    # workaround is to copy the secret into env, then test env.
    env:
      HARDCOVER_TOKEN: ${{ secrets.HARDCOVER_TOKEN }}
    steps:
      # ook checkout — gives us the scripts and the lockfile.
      - name: Checkout ook
        uses: actions/checkout@v4
        with:
          path: ook

      # vhata/books checkout — write-capable. Uses GH_BOOKS_PAT so the
      # final `git push` actually has somewhere to go.
      - name: Checkout books vault
        uses: actions/checkout@v4
        with:
          repository: vhata/books
          path: books
          token: ${{ secrets.GH_BOOKS_PAT }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ook/pnpm-lock.yaml

      - name: Install ook dependencies
        working-directory: ook
        run: pnpm install --frozen-lockfile

      # Lint runs first — fail loud on a broken vault rather than
      # commit a backfill on top of unresolved errors.
      - name: Lint vault (fail-loud)
        working-directory: ook
        env:
          BOOKS_DIR: ${{ github.workspace }}/books
        run: make vault-lint

      # Inlined safe-to-automate backfills. Mirrors `vault-backfill-apply`
      # minus `backfill-tags.mjs` (Open Library, slow + rate-limited).
      # Order matches the umbrella target's dependency order.
      - name: Run idempotent backfills
        working-directory: ook
        env:
          BOOKS_DIR: ${{ github.workspace }}/books
        run: |
          set -e
          echo "→ source --apply"
          node scripts/backfill-source.mjs --apply
          echo "→ tags-from-peers --apply"
          node scripts/backfill-tags-from-peers.mjs --apply
          echo "→ see_also --apply (series + author)"
          node scripts/backfill-see-also.mjs --apply
          echo "→ see_also-from-tags --apply"
          node scripts/backfill-see-also-from-tags.mjs --apply
          echo "→ see_also-bidirectional --apply"
          node scripts/backfill-see-also-bidirectional.mjs --apply

      # Commit + push only if something actually changed. The bot
      # identity matches the workflow's purpose so audit-trail readers
      # can spot auto-commits at a glance.
      - name: Commit + push if dirty
        working-directory: books
        run: |
          set -e
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "ook-vault-hygiene[bot]"
          git config user.email "ook-vault-hygiene@users.noreply.github.com"
          git add -A
          REF="${{ github.event.client_payload.ref || github.sha }}"
          git commit -m "Auto-hygiene: backfills on top of ${REF}"
          git push

      # Hardcover sync — push the vault's status / rating / dates up
      # to the operator's Hardcover account. Idempotent (cache file at
      # _meta/hardcover-sync-state.json short-circuits no-ops; remote
      # diff check before every mutation). Skipped silently when the
      # HARDCOVER_TOKEN secret is unset, so the workflow still works
      # for forks / contributors without that surface.
      #
      # Runs AFTER the auto-hygiene commit so a backfill that flipped
      # frontmatter doesn't race against the sync. The cache file lives
      # under _meta/ in the books checkout; we commit it back in the
      # follow-up step below so re-runs benefit.
      - name: Sync vault status to Hardcover
        if: ${{ env.HARDCOVER_TOKEN != '' }}
        working-directory: ook
        env:
          BOOKS_DIR: ${{ github.workspace }}/books
        run: node scripts/sync-hardcover-status.mjs --apply

      - name: Commit + push hardcover-sync-state if dirty
        if: ${{ env.HARDCOVER_TOKEN != '' }}
        working-directory: books
        run: |
          set -e
          if [ -z "$(git status --porcelain)" ]; then
            echo "No sync-state changes."
            exit 0
          fi
          git config user.name "ook-vault-hygiene[bot]"
          git config user.email "ook-vault-hygiene@users.noreply.github.com"
          git add -A
          git commit -m "Auto-hygiene: hardcover-sync-state refresh"
          git push
